name: Python Lint and Syntax Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Syntax compilation check
      run: |
        python -m py_compile app.py src/agents.py src/connectors.py src/frameworks.py src/gemini_client.py src/retrieval.py src/database.py src/trust_center.py src/auditor_portal.py
